<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
  #player-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
  #player { width: 100%; height: 100vh; max-width: calc(100vh * 9 / 16); }
  #touchOverlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  #unmuteButton { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 25px;     font-size: 18px; color: white; background: rgba(0,0,0,0.8); border: 1px solid #fff; border-radius: 30px; z-index: 20; cursor: pointer; }
</style>
</head>
<body>
<div id="player-container">
  <div id="player"></div>
  <div id="touchOverlay"></div>
  <button id="unmuteButton">🔊 소리 켜기</button>
</div>
<script>
  var videoIds = ["1xdsnGLoUIY","c-Ij3xFIGKk","HBl9bSLmJ28","dsN5SVKvjNk","3kKQJaFHFnI","441thNvKWz0","jHxvu1saq-U","Ir7cgVgN6ps","zOO9UkZeyTU","AJNs4CqR6hM","0RElmnX8eh4","vwuyWLQKBLA","QZ-JU5_Y9qY","8TZg0TkNthk","k1Tl4kgh7L8","J6W15MK2-KM","_MX8DYnza_o","7Q1Y3MnCiXk","n4GqtCDNStw","EAYUNC8zy3w","-bAs28wXRXo","vhg4-SjMVRQ"];
  var player; var currentIndex = 0;
  function onYouTubeIframeAPIReady() {
    if (!videoIds || videoIds.length === 0) return;
    player = new YT.Player("player", {
      height: "100%", width: "100%", videoId: videoIds[0],
      playerVars: { "autoplay": 1, "mute": 1, "playsinline": 1, "controls": 0, "rel": 0, "modestbranding": 1 },
      events: { "onStateChange": onStateChange, "onReady": onReady }
    });
  }
  function onReady(event) {
    document.getElementById("unmuteButton").onclick = function() { player.unMute(); this.style.display = "none"; };
    setupTouch();
  }
  function onStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) nextVideo();
  }
  function nextVideo() {
    currentIndex = (currentIndex + 1) % videoIds.length;
    player.loadVideoById(videoIds[currentIndex]);
  }
  function prevVideo() {
    currentIndex = (currentIndex - 1 + videoIds.length) % videoIds.length;
    player.loadVideoById(videoIds[currentIndex]);
  }
  function setupTouch() {
    var overlay = document.getElementById("touchOverlay");
    var startY = 0; var startTime = 0;
    overlay.addEventListener("touchstart", function(e) { startY = e.touches[0].clientY; startTime = Date.now(); }, {passive:true});
    overlay.addEventListener("touchend", function(e) {
      var deltaY = startY - e.changedTouches[0].clientY;
      var duration = Date.now() - startTime;
      if (Math.abs(deltaY) > 50) {
        if (deltaY > 0) nextVideo(); else prevVideo();
      } else if (duration < 300) {
        var state = player.getPlayerState();
        if (state === 1) player.pauseVideo(); else player.playVideo();
      }
    }, {passive:true});
  }
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
