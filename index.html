  var player; var currentIndex = 0;
  function onYouTubeIframeAPIReady() {
    if (!videoIds || videoIds.length === 0) return;
    player = new YT.Player("player", {
      height: "100%", width: "100%", videoId: videoIds[0],
      playerVars: { "autoplay": 1, "mute": 1, "playsinline": 1, "controls": 0, "rel": 0, "modestbranding": 1 },
      events: { "onStateChange": onStateChange, "onReady": onReady }
    });
  }
  function onReady(event) {
    document.getElementById("unmuteButton").onclick = function() { player.unMute(); this.style.display = "none"; };
    setupControls();
  }
  function onStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) nextVideo();
  }
  function nextVideo() {
    currentIndex = (currentIndex + 1) % videoIds.length;
    player.loadVideoById(videoIds[currentIndex]);
  }
  function prevVideo() {
    currentIndex = (currentIndex - 1 + videoIds.length) % videoIds.length;
    player.loadVideoById(videoIds[currentIndex]);
  }
  function setupControls() {
    var overlay = document.getElementById("touchOverlay");
    var startY = 0; var startTime = 0; var isDown = false;
    overlay.onpointerdown = function(e) { startY = e.clientY; startTime = Date.now(); isDown = true; };
    overlay.onpointerup = function(e) {
      if(!isDown) return; isDown = false;
      var deltaY = startY - e.clientY;
      var dur = Date.now() - startTime;
      if (Math.abs(deltaY) > 50) {
        if (deltaY > 0) nextVideo(); else prevVideo();
      } else if (dur < 250) {
        var s = player.getPlayerState();
        if (s === 1) player.pauseVideo(); else player.playVideo();
      }
    };
    window.onwheel = function(e) { if (Math.abs(e.deltaY) > 50) { if (e.deltaY > 0) nextVideo(); else prevVideo(); } };
    window.onkeydown = function(e) {
      if (e.key === "ArrowDown" || e.key === "ArrowRight") nextVideo();
      else if (e.key === "ArrowUp" || e.key === "ArrowLeft") prevVideo();
      else if (e.key === " ") { e.preventDefault(); var s = player.getPlayerState(); if (s === 1) player.pauseVideo(); else player.playVideo(); }
    };
  }
</script>
