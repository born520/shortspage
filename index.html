<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
  #player-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
  #player { width: 100%; height: 100vh; max-width: calc(100vh * 9 / 16); pointer-events: none; }
  #touchOverlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; cursor: grab; -webkit-tap-highlight-color: transparent; touch-action: none; }
  .ui-icon-wrap { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px;     background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center;     z-index: 30; opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
  .ui-icon-wrap.active { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  .ui-icon-wrap svg { width: 40px; height: 40px; fill: white; }
  .nav-dots { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 15; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .dot.active { background: #fff; width: 14px; border-radius: 10px; }
</style>
</head>
<body>
<div id="player-container">
  <div id="player"></div>
  <div id="touchOverlay"></div>
  <div id="playIcon" class="ui-icon-wrap active"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
  <div id="pauseIcon" class="ui-icon-wrap"><svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></div>
  <div class="nav-dots"></div>
</div>
<script>
  var videoIds = ["d43zR-fUFpM","fc6m_043hPo","dKGxr1QDxvY","xRWhSD1YTok","le0wDxUWFmU","bzsNTD201Kg","EEUNsveVd28","Cd9VHOshC0g","6Aemmh8PDI0","DQH-BSEDSeI","OrbGXUekq9M","pVa7VlbBCY8","S_Th9DvBvU8","NcCZEg8oOm8","eCL-9MwZIqo","JX7glFlbg2k","06aUXND31uo","TGGVvBVdpOY","0DcQMJeCG90","nRn4C-2DzyE","RxDsuoTGY5I","IZNurtpFLcE","b813J4vIRvI","Qhvo2hMqAbY","2HDWVZl8oOU","fgt1PXStkK4","w4WlMReQvZ0","zSXGHFkvwuk","j7upBooqR5A","dY5lAeygnUM","O8ByazilTYk","_Jgei7h4kGk","8Pz2Se7uOeY","nUi-j_VYTEs","XT3H33wkSwQ","yVVL40bt270","Fh0hqWuQTz4","XilJwxccDg0","SHPe39lpZlI","VVcNIBZdqKY","sbDZ-g9b0PU","IRQmUW2Z0R8","WVsgEZV-ZVU","x6LND9CaYIo","yu7gbjpanV0","kDb1_2dcZ5o","xZc395oX6n4","iYYtxPaKASk","EHNEUIfd6tE","6iyXIOjksgA","cfTkohN8o5k","pqWkdwGn3BU","e579OkhlXIA","ge1s-yJ4n2o","PH2z82VwSaE","VoE430j7CmE","K9FYzSbUwjY","Ir7cgVgN6ps","zOO9UkZeyTU","3QREnt4VQO0","Gm01W9Trfeo","KsvMqOW38mM","uoTDQ2MZ-JM","GU9NVirmOzA","ymmxt1TII3c","AJNs4CqR6hM","0RElmnX8eh4","vwuyWLQKBLA","QZ-JU5_Y9qY","8TZg0TkNthk","k1Tl4kgh7L8","J6W15MK2-KM","_MX8DYnza_o","7Q1Y3MnCiXk","n4GqtCDNStw","EAYUNC8zy3w","-bAs28wXRXo","vhg4-SjMVRQ","ttgw9HOnKXY","5FfPrj010SU","2B-ultqc78A","GPV749sdp5E","_PE_cy4MX6M","dXQ7kMEsACk","3EBJeM6rSks","kMPHwQPnEr0","YcNQjl7xtgM","51sHxmJjfS0","X4i65qemEZM","piCIihD4Qx8"];
  var allPages = ["1","2","3","4","5"];
  var currentPage = "1";
  var player; var currentIndex = 0;
  function onYouTubeIframeAPIReady() {
    if (!videoIds || videoIds.length === 0) return;
    var isStarted = sessionStorage.getItem("yt_active") === "true";
    player = new YT.Player("player", {
      height: "100%", width: "100%", videoId: videoIds[0], 
      playerVars: { "autoplay": isStarted?1:0, "mute": isStarted?0:1, "playsinline": 1, "controls": 0, "rel": 0 },
      events: { "onStateChange": onStateChange, "onReady": onPlayerReady }
    });
  }
  function onPlayerReady() {
    if (sessionStorage.getItem("yt_active") === "true") {
       player.playVideo(); player.unMute(); document.getElementById("playIcon").classList.remove("active");
    }
    var nav = document.querySelector(".nav-dots");
    allPages.forEach(function(p){ var d=document.createElement("div"); d.className=(p===currentPage)?"dot active":"dot"; nav.appendChild(d); });
    setupControls();
  }
  function onStateChange(event) { if (event.data === YT.PlayerState.ENDED) nextVideo(); }
  function nextVideo() { currentIndex = (currentIndex + 1) % videoIds.length; player.loadVideoById(videoIds[currentIndex]); }
  function prevVideo() { currentIndex = (currentIndex - 1 + videoIds.length) % videoIds.length; player.loadVideoById(videoIds[currentIndex]); }
  function changePage(dir) {
    var idx = allPages.indexOf(currentPage) + dir;
    if (idx >= 0 && idx < allPages.length) {
      window.location.href = (allPages[idx] === "1") ? "index.html" : "page" + allPages[idx] + ".html";
    }
  }
  function togglePlay() {
    sessionStorage.setItem("yt_active", "true");
    var state = player.getPlayerState();
    var pIcon = document.getElementById("playIcon");
    var sIcon = document.getElementById("pauseIcon");
    if (state === 1) {
      player.pauseVideo(); pIcon.classList.add("active"); sIcon.classList.remove("active");
    } else {
      player.unMute(); player.playVideo(); pIcon.classList.remove("active"); sIcon.classList.add("active");
      setTimeout(function(){ sIcon.classList.remove("active"); }, 600);
    }
  }
  function setupControls() {
    var overlay = document.getElementById("touchOverlay");
    var startX = 0, startY = 0, startTime = 0, isDown = false;
    overlay.addEventListener("pointerdown", function(e) { startX = e.clientX; startY = e.clientY; startTime = Date.now(); isDown = true; });
    overlay.addEventListener("pointerup", function(e) {
      if(!isDown) return; isDown = false;
      var dx = startX - e.clientX; var dy = startY - e.clientY; var dur = Date.now() - startTime;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) { if (dx > 0) changePage(1); else changePage(-1); }
      else if (Math.abs(dy) > 40) { if (dy > 0) nextVideo(); else prevVideo(); }
      else if (dur < 250) { togglePlay(); }
    });
    window.onwheel = function(e) { if (Math.abs(e.deltaY) > 50) { if (e.deltaY > 0) nextVideo(); else prevVideo(); } };
    window.onkeydown = function(e) {
      if (e.key === "ArrowDown") nextVideo(); else if (e.key === "ArrowUp") prevVideo();
      else if (e.key === "ArrowRight") changePage(1); else if (e.key === "ArrowLeft") changePage(-1);
      else if (e.key === " ") { e.preventDefault(); togglePlay(); }
    };
  }
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
