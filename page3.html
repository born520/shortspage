<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
  #player-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
  #player { width: 100%; height: 100vh; max-width: calc(100vh * 9 / 16); pointer-events: none; }
  #touchOverlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; cursor: grab; -webkit-tap-highlight-color: transparent; touch-action: none; }
  #playBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px;     font-size: 20px; font-weight: bold; color: white; background: rgba(255,0,0,0.8); border: none; border-radius: 50px; z-index: 30; cursor: pointer; }
  .nav-dots { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 15; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .dot.active { background: #fff; }
</style>
</head>
<body>
<div id="player-container">
  <div id="player"></div>
  <div id="touchOverlay"></div>
  <button id="playBtn">▶ 재생 시작</button>
  <div class="nav-dots"></div>
</div>
<script>
  var videoIds = ["xk5QMeeQVmc","vYjDiRYvY2w","ylNGBjs2jzs","GnJp0v4kQC0","HpBMet_TtB0","ODITy5PNeOM","w0x898S-Sv0","A54RpmzDUCQ","JosLuNNxMIA","MtFhi4y5unM","pgeJR4-NnYo","Rxe4-WkgrLc","ZVADcXLy824","8JpNav-JQtI","4CDjXyzhPF4","649CGyToOAE","M-Tm6Ni7w90","GWw7OUs5kJE","bmMOQ_Y3eno","3lHcnRLpO84","co2C0CVAnzM","4wRVZPq6sLI","x-V6sVb6ehk","N0kr4TWUmrI","9lEgp_fgQVs","wIuuGmCKqlw","ICZq7zlu2ps","wCk2tbT6NWM","hnUrLxXHVQ8","BnZShdsy2AA"];
  var allPages = ["1","2","3"];
  var currentPage = "3";
  var player; var currentIndex = 0;
  function onYouTubeIframeAPIReady() {
    if (!videoIds || videoIds.length === 0) return;
    var isStarted = sessionStorage.getItem("isStarted") === "true";
    player = new YT.Player("player", {
      height: "100%", width: "100%", videoId: videoIds[0], 
      playerVars: { "autoplay": isStarted?1:0, "mute": isStarted?0:1, "playsinline": 1, "controls": 0, "rel": 0 },
      events: { "onStateChange": onStateChange, "onReady": onPlayerReady }
    });
  }
  function onPlayerReady() {
    var btn = document.getElementById("playBtn");
    if (sessionStorage.getItem("isStarted") === "true") {
      btn.style.display = "none"; player.playVideo(); player.unMute();
    }
    btn.onclick = function() {
      sessionStorage.setItem("isStarted", "true");
      player.unMute(); player.playVideo();
      btn.style.display = "none";
    };
    var nav = document.querySelector(".nav-dots");
    allPages.forEach(function(p){ var d=document.createElement("div"); d.className=(p===currentPage)?"dot active":"dot"; nav.appendChild(d); });
    setupControls();
  }
  function onStateChange(event) { if (event.data === YT.PlayerState.ENDED) nextVideo(); }
  function nextVideo() { currentIndex = (currentIndex + 1) % videoIds.length; player.loadVideoById(videoIds[currentIndex]); }
  function prevVideo() { currentIndex = (currentIndex - 1 + videoIds.length) % videoIds.length; player.loadVideoById(videoIds[currentIndex]); }
  function changePage(dir) {
    var idx = allPages.indexOf(currentPage) + dir;
    if (idx >= 0 && idx < allPages.length) {
      var target = allPages[idx];
      window.location.href = (target === "1") ? "index.html" : "page" + target + ".html";
    }
  }
  function setupControls() {
    var overlay = document.getElementById("touchOverlay");
    var startX = 0, startY = 0, startTime = 0, isDown = false;
    overlay.addEventListener("pointerdown", function(e) { startX = e.clientX; startY = e.clientY; startTime = Date.now(); isDown = true; });
    overlay.addEventListener("pointerup", function(e) {
      if(!isDown) return; isDown = false;
      var dx = startX - e.clientX; var dy = startY - e.clientY; var dur = Date.now() - startTime;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) { if (dx > 0) changePage(1); else changePage(-1); }
      else if (Math.abs(dy) > 40) { if (dy > 0) nextVideo(); else prevVideo(); }
      else if (dur < 250) { var s = player.getPlayerState(); if (s === 1) player.pauseVideo(); else player.playVideo(); }
    });
    window.onwheel = function(e) { if (Math.abs(e.deltaY) > 50) { if (e.deltaY > 0) nextVideo(); else prevVideo(); } };
    window.onkeydown = function(e) {
      if (e.key === "ArrowDown") nextVideo(); else if (e.key === "ArrowUp") prevVideo();
      else if (e.key === "ArrowRight") changePage(1); else if (e.key === "ArrowLeft") changePage(-1);
    };
  }
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
